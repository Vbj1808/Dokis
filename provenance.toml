# Dokis configuration - copy and customise for your project.
# Load with: config = dokis.Config.from_yaml("provenance.toml")

allowed_domains = [
    "pubmed.ncbi.nlm.nih.gov",
    "cochrane.org",
    "nejm.org",
    "who.int",
]

min_citation_rate = 0.85
claim_threshold   = 0.30
# claimify is the default extractor; set "regex" here to preserve the legacy splitter.
extractor         = "claimify"
matcher           = "bm25"
model             = "all-MiniLM-L6-v2"
enforcement_mode  = "guardrail"
max_source_age_days = 365
stale_source_action = "fail"
# source_date_metadata_key = "published_at"  # optional override; falls back to common keys like year/date
# fail_on_violation = false  # legacy alias for enforcement_mode="enforce"
domain            = "oncology"
